<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div data-node-id="{{ nodeId }}" onClick="{{ handleClick }}" title="{{ title }}" style="{{ chipStyle }}" style-hover="border-color:rgba(187,154,247,0.42);transform:translateY(-1px)">
  <div style="display:flex;align-items:center;gap:9px">
    <sc-if value="{{ human }}" hint-placeholder-val="{{ false }}"><span style="{{ avatarStyle }}">{{ avatarChar }}</span></sc-if>
    <sc-if value="{{ notHuman }}" hint-placeholder-val="{{ true }}"><span style="{{ dotStyle }}"></span></sc-if>
    <span style="font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13.5px;color:#eef0ff;letter-spacing:-0.01em;white-space:nowrap">{{ label }}</span>
    <sc-if value="{{ human }}" hint-placeholder-val="{{ false }}"><span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.12em;color:#e0af68;background:rgba(224,175,104,0.12);border:1px solid rgba(224,175,104,0.3);padding:2px 6px;border-radius:5px">HUMAN</span></sc-if>
  </div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:9.5px;color:#5a6088;letter-spacing:0.01em;line-height:1.3">{{ sub }}</div>
  <sc-if value="{{ hasBadges }}" hint-placeholder-val="{{ false }}"><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:1px"><sc-for list="{{ badges }}" as="b" hint-placeholder-count="0"><span style="{{ b.style }}">{{ b.t }}</span></sc-for></div></sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:92},&quot;nodeId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;g4&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;g4&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sub&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;coordinator&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;presence&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;blocked&quot;,&quot;options&quot;:[&quot;working&quot;,&quot;idle&quot;,&quot;blocked&quot;,&quot;never&quot;,&quot;human&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;selected&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;human&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;badges&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;{t:string;style:object}[]&quot;},&quot;onSelect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(id:string)=&gt;void&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const p = this.props || {};
    const presence = p.presence || 'idle';
    const sel = !!p.selected;
    const human = presence === 'human' || !!p.human;
    const idle = '#6b7199';
    const dotMap = {
      working:{ background:'#9ece6a', boxShadow:'0 0 8px rgba(158,206,106,.55)' },
      blocked:{ background:'#ff9e64', boxShadow:'0 0 8px rgba(255,158,100,.5)' },
      idle:{ background:idle },
      never:{ background:'transparent', border:'1.5px solid rgba(139,144,184,.75)' }
    };
    const dm = dotMap[presence] || dotMap.idle;
    const dotStyle = Object.assign({ width:'9px', height:'9px', borderRadius:'50%', flex:'none', display:'inline-block' }, dm);
    const chipBg = human ? 'rgba(224,175,104,0.06)' : (sel ? 'rgba(187,154,247,0.10)' : 'rgba(13,15,28,0.72)');
    const chipBorder = sel ? 'rgba(187,154,247,0.5)' : (human ? 'rgba(224,175,104,0.28)' : 'rgba(160,168,220,0.13)');
    const chipStyle = {
      display:'flex', flexDirection:'column', gap:'5px', minWidth:'152px', maxWidth:'196px',
      padding:'9px 12px 10px', borderRadius:'11px', cursor:'pointer', position:'relative',
      background:chipBg, border:'1px solid '+chipBorder,
      boxShadow: sel ? '0 0 0 1px rgba(187,154,247,0.25),0 12px 32px rgba(0,0,0,0.4)' : '0 1px 2px rgba(0,0,0,0.28)',
      transition:'border-color .16s ease,box-shadow .16s ease,transform .16s ease,background .16s ease',
      WebkitTapHighlightColor:'transparent'
    };
    const avatarStyle = {
      width:'22px', height:'22px', flex:'none', borderRadius:'6px', display:'flex',
      alignItems:'center', justifyContent:'center', fontFamily:"'JetBrains Mono',monospace",
      fontSize:'11px', fontWeight:600, color:'#e0af68', background:'rgba(224,175,104,0.14)',
      border:'1px solid rgba(224,175,104,0.4)'
    };
    const badges = p.badges || [];
    return {
      nodeId: p.nodeId, label: p.label || '', sub: p.sub || '',
      human, notHuman: !human, dotStyle, chipStyle, avatarStyle, avatarChar: 'j',
      badges, hasBadges: badges.length > 0,
      title: (p.label || '') + ' · ' + presence,
      handleClick: (e) => { if (e && e.stopPropagation) e.stopPropagation(); if (p.onSelect) p.onSelect(p.nodeId); }
    };
  }
}
</script>
</body>
</html>
