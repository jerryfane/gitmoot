name: CI

# Runs the build/vet/test gate on every push to main and every pull request, so
# "the tests pass" is enforced on a clean checkout rather than trusted from a
# local run. Does NOT run the live multi-runtime (codex/claude/kimi) E2E — that
# needs runtime auth and stays a manual step.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Generated contract is current
        # The gitmoot_result reply contract is single-sourced from the workflow
        # result structs and regenerated into internal/prompts/contract_generated.go
        # by `go generate ./...`. Fail if the checked-in artifact is stale so a
        # struct change can never silently drift the prompt agents are given.
        run: |
          go generate ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race detector, workflow engine + cli + db + daemon)
        # internal/cli is race-tested too because the #484 canary auto-rollback
        # decorator (canary_daemon.go) carries a concurrency contract — the daemon
        # runs jobs in a parallel worker pool, so two same-template harvests can
        # race to roll back the same canary and `candidate.rolled_back` must still
        # fire exactly once. TestCanaryLifecycleE2E's concurrent subtest asserts
        # that dedup, so it belongs under the detector.
        #
        # internal/db and internal/daemon are race-tested because the #536 stale-
        # recovery / worktree-cleanup fix adds concurrency-sensitive resource_locks
        # reads (JobRuntimeLockLiveness, DeleteExpiredResourceLocks) that the daemon
        # worker pool exercises from multiple goroutines.
        run: go test -race ./internal/workflow/ ./internal/cli/ ./internal/db/ ./internal/daemon/
